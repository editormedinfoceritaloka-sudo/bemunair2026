name: bemunair

services:
  db:
    image: mysql:8.0
    container_name: bemunair_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: bemunair_db
      MYSQL_USER: bemunair
      MYSQL_PASSWORD: bemunair_password
    ports:
      - "3308:3306"
    volumes:
      - bemunair_mysql_data:/var/lib/mysql
      - ../server/database/migrations/001_create_users_table.sql:/docker-entrypoint-initdb.d/001_create_users_table.sql:ro
      - ../server/database/migrations/002_create_content_submissions_table.sql:/docker-entrypoint-initdb.d/002_create_content_submissions_table.sql:ro
      - ../server/database/migrations/003_create_letter_submissions_table.sql:/docker-entrypoint-initdb.d/003_create_letter_submissions_table.sql:ro
      - ../server/database/migrations/004_create_medinfo_pj_queues_table.sql:/docker-entrypoint-initdb.d/004_create_medinfo_pj_queues_table.sql:ro
      - ../server/database/migrations/005_create_letter_templates_table.sql:/docker-entrypoint-initdb.d/005_create_letter_templates_table.sql:ro
      - ../server/database/seeders/001_seed_users_and_queue.sql:/docker-entrypoint-initdb.d/006_seed_users_and_queue.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "bemunair", "-pbemunair_password"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bemunair_net

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: bemunair_server
    env_file:
      - ../server/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../docs/api:/docs/api:ro
    networks:
      - bemunair_net
    develop:
      watch:
        - path: ../server
          action: rebuild
          ignore:
            - vendor/
            - bin/
            - tmp/
            - main
        - path: ../server/go.mod
          action: rebuild
        - path: ../server/go.sum
          action: rebuild

  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    container_name: bemunair_client
    env_file:
      - ../client/.env
    depends_on:
      - server
    networks:
      - bemunair_net
    develop:
      watch:
        - path: ../client/src
          action: rebuild
        - path: ../client/static
          action: rebuild
        - path: ../client/package.json
          action: rebuild

  wa-engine:
    build:
      context: ../wa-engine
      dockerfile: Dockerfile
    container_name: bemunair_wa_engine
    env_file:
      - ../wa-engine/.env
    ports:
      - "3001:3001"
    volumes:
      - wa_auth_data:/app/sessions
    depends_on:
      - server
    networks:
      - bemunair_net
    restart: unless-stopped
    develop:
      watch:
        - path: ../wa-engine/src
          action: sync+restart
          target: /app/src
        - path: ../wa-engine/package.json
          action: rebuild
        - path: ../wa-engine/pnpm-lock.yaml
          action: rebuild

  nginx:
    image: nginx:alpine
    container_name: bemunair_nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server
    networks:
      - bemunair_net

networks:
  bemunair_net:
    driver: bridge

volumes:
  bemunair_mysql_data:
  wa_auth_data:
